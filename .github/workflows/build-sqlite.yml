name: Build better-sqlite3 for cPanel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build in CentOS 8 container
        run: |
          docker run --rm -v $PWD:/output centos:8 bash -c "
            sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-* &&
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-* &&
            yum install -y gcc-c++ make &&
            yum install -y python38 &&
            alternatives --set python3 /usr/bin/python3.8 &&
            curl -fsSL https://rpm.nodesource.com/setup_24.x | bash - &&
            yum install -y nodejs &&
            cd /output &&
            npm cache clean --force &&
            export CXXFLAGS='-std=gnu++17' &&
            npm install better-sqlite3@8.1.0 &&
            cp node_modules/better-sqlite3/build/Release/better_sqlite3.node /output/
          "
      
      - uses: actions/upload-artifact@v4
        with:
          name: better-sqlite3-centos8-node24
          path: better_sqlite3.node
