name: Build better-sqlite3 for cPanel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build in AlmaLinux 8 container
        run: |
          docker run --rm -v $PWD:/output almalinux:8 bash -c "
            yum install -y gcc-toolset-10-gcc-c++ make python38 &&
            alternatives --set python3 /usr/bin/python3.8 &&
            curl -fsSL https://rpm.nodesource.com/setup_24.x | bash - &&
            yum install -y nodejs &&
            source /opt/rh/gcc-toolset-10/enable &&
            cd /output &&
            npm cache clean --force &&
            npm install better-sqlite3@9.6.0 &&
            cp node_modules/better-sqlite3/build/Release/better_sqlite3.node /output/
          "
      
      - uses: actions/upload-artifact@v4
        with:
          name: better-sqlite3-almalinux8-node24
          path: better_sqlite3.node
