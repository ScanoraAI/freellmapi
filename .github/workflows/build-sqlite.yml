name: Build better-sqlite3 for cPanel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build and patch binary
        run: |
          docker run --rm -v $PWD:/output ubuntu:20.04 bash -c "
            apt-get update &&
            DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs npm python3 curl patchelf &&
            curl -fsSL https://deb.nodesource.com/setup_24.x | bash - &&
            apt-get install -y nodejs &&
            cd /output &&
            npm cache clean --force &&
            npm install better-sqlite3@9.6.0 &&
            patchelf --clear-symbol-version log node_modules/better-sqlite3/build/Release/better_sqlite3.node &&
            patchelf --clear-symbol-version pow node_modules/better-sqlite3/build/Release/better_sqlite3.node &&
            patchelf --clear-symbol-version log2 node_modules/better-sqlite3/build/Release/better_sqlite3.node &&
            patchelf --clear-symbol-version exp node_modules/better-sqlite3/build/Release/better_sqlite3.node &&
            cp node_modules/better-sqlite3/build/Release/better_sqlite3.node /output/
          "
      
      - uses: actions/upload-artifact@v4
        with:
          name: better-sqlite3-ubuntu2004-node24
          path: better_sqlite3.node
